<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
  {% seo %}
</head>
<body class="{% if page.layout == 'home' %}body-home{% else %}body-inner{% endif %}">
  <div class="background-wallpaper"></div>
  <div class="background-overlay"></div>

  {% if page.layout != 'home' %}
  <nav class="navbar">
    <div class="nav-container">
      <a class="nav-brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <button class="nav-toggle" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links">
        <li><a href="{{ '/' | relative_url }}">首页</a></li>
        <li><a href="{{ '/about/' | relative_url }}">关于</a></li>
        <li><a href="{{ '/archive/' | relative_url }}">归档</a></li>
      </ul>
    </div>
  </nav>
  {% endif %}

  <main class="main-content">
    {{ content }}
  </main>

  {% if page.layout != 'home' %}
  <footer class="site-footer">
    <div class="footer-content">
      <p>&copy; {{ 'now' | date: "%Y" }} {{ site.title }}. All rights reserved.</p>
      <p class="footer-subtitle">以文字记录生活，以代码构建世界</p>
    </div>
  </footer>
  {% endif %}

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
